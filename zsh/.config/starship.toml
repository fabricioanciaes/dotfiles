add_newline = false
command_timeout = 1000
format = "$directory$git_branch$git_status$fill$nodejs$python$rust$golang$lua$cmd_duration$line_break$character"

[character]
success_symbol = "[➜](bold green) "
error_symbol = "[➜](bold red) "
vimcmd_symbol = "[⇠](bold yellow) "

[directory]
truncation_length = 3
truncate_to_repo = false
style = "bold cyan"

[fill]
symbol = " "

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold red"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[nodejs]
format = " [via $version](bold green)"

[python]
format = " [via ${pyenv_prefix}${version}(\\($virtualenv\\))](bold yellow)"

[rust]
format = " [via $version](bold red)"

[golang]
format = " [via $version](bold cyan)"

[lua]
format = " [via $version](bold blue)"

[cmd_duration]
min_time = 2000
format = " [$duration](dimmed yellow)"
