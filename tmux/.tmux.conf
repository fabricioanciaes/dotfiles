# Minimal tmux config

# Set prefix to Ctrl-a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Kill panes without confirmation
bind-key x kill-pane

# Pane focus with vim keys
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# tmux-sessionizer keybinding
bind-key -n C-f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# Open GitHub URL keybinding
bind-key -n C-o run-shell -b "~/.local/bin/open-github > /dev/null 2>&1"

# Enable mouse support
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Status bar on top
set-option -g status-position top

# Status bar styling (minimal)
set -g status-style 'bg=default fg=white'
set -g status-left ''
set -g status-right '#[fg=white]#S '
set -g status-right-length 50
set -g status-left-length 20

# Window status format
setw -g window-status-current-style 'fg=black bg=white bold'
setw -g window-status-current-format ' #I:#W '
setw -g window-status-style 'fg=white bg=default'
setw -g window-status-format ' #I:#W '

# Enable 256 colors
set -g default-terminal "screen-256color"

# List of plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'wfxr/tmux-fzf-url'

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
